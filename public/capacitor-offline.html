<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050403" />
    <title>Hellen Designer offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050403;
        color: #f7efe3;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(202, 163, 83, 0.22), transparent 34rem),
          linear-gradient(180deg, #14100c 0%, #050403 68%);
      }

      main {
        width: min(100%, 430px);
        border: 1px solid rgba(234, 205, 142, 0.26);
        border-radius: 18px;
        padding: 28px;
        background: rgba(12, 10, 8, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 31px;
        line-height: 1.08;
      }

      p {
        margin: 0 0 20px;
        color: #dacbb9;
        line-height: 1.55;
      }

      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        background: #d8b86d;
        color: #120d08;
        font: inherit;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Painel indisponivel.</h1>
      <p>
        Nao foi possivel carregar o admin online. Confira a conexao com a internet e tente novamente.
      </p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
