name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/android-apk.yml'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Sync Android project
        env:
          CAPACITOR_SERVER_URL: https://hellen-designer-admin.vercel.app
          VITE_PUBLIC_SITE_URL: https://hellen-designer.vercel.app
          VITE_ADMIN_SITE_URL: https://hellen-designer-admin.vercel.app
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run mobile:sync

      - name: Verify Android security settings
        run: |
          grep -q 'android:allowBackup="false"' android/app/src/main/AndroidManifest.xml
          grep -q 'android:usesCleartextTraffic="false"' android/app/src/main/AndroidManifest.xml
          grep -q 'cleartextTrafficPermitted="false"' android/app/src/main/res/xml/network_security_config.xml

      - name: Decode release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APK and AAB
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hellen-designer-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hellen-designer-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Detect Firebase App Distribution credentials
        id: firebase_distribution
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ] && [ -n "$FIREBASE_ANDROID_APP_ID" ] && { [ -n "$FIREBASE_TESTER_GROUPS" ] || [ -n "$FIREBASE_TESTERS" ]; }; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK to Firebase App Distribution
        if: steps.firebase_distribution.outputs.configured == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
        run: |
          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          release_notes_file="$RUNNER_TEMP/firebase-release-notes.txt"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credentials_file"
          {
            echo "Hellen Designer Android 1.0.${{ github.run_number }}"
            echo "Commit: $GITHUB_SHA"
            echo "Admin: https://hellen-designer-admin.vercel.app"
          } > "$release_notes_file"

          args=(
            appdistribution:distribute
            android/app/build/outputs/apk/release/app-release.apk
            --app "$FIREBASE_ANDROID_APP_ID"
            --release-notes-file "$release_notes_file"
          )

          if [ -n "$FIREBASE_TESTER_GROUPS" ]; then
            args+=(--groups "$FIREBASE_TESTER_GROUPS")
          fi

          if [ -n "$FIREBASE_TESTERS" ]; then
            args+=(--testers "$FIREBASE_TESTERS")
          fi

          GOOGLE_APPLICATION_CREDENTIALS="$credentials_file" npx --yes firebase-tools@latest "${args[@]}"

      - name: Detect Google Play credentials
        id: play_credentials
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AAB to Google Play internal track
        if: steps.play_credentials.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: br.com.hellendesigner.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          inAppUpdatePriority: 5
          releaseName: Hellen Designer 1.0.${{ github.run_number }}
