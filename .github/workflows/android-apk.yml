name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/android-apk.yml'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Sync Android project
        run: npm run mobile:sync

      - name: Verify Android security settings
        run: |
          grep -q 'android:allowBackup="false"' android/app/src/main/AndroidManifest.xml
          grep -q 'android:usesCleartextTraffic="false"' android/app/src/main/AndroidManifest.xml
          grep -q 'cleartextTrafficPermitted="false"' android/app/src/main/res/xml/network_security_config.xml

      - name: Decode release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APK
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hellen-designer-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
